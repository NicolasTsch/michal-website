# Netlify configuration for michaloren.com
# No build step needed — this is a plain HTML/CSS/JS site.

[build]
  publish = "."    # Serve files from the root folder

# Redirect www → non-www (optional, good practice)
[[redirects]]
  from = "https://www.michaloren.com/*"
  to   = "https://michaloren.com/:splat"
  status = 301
  force  = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
